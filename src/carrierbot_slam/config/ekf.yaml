ekff_filter_node:
  ros__parameters:
    frequency: 30
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom


    odom0: /wheel_odometry
    odom0_config:
          [ false, false, false,   # x, y, z
            false, false, true,    # roll, pitch, yaw
            true,  true,  false,   # vx, vy, vz
            false, false, false,    # vroll, vpitch, vyaw
            false, false, false ]  # ax, ay, az

    imu0: /imu/data
    imu0_config:
          [ false, false, false,
            false, false, true,
            false, false, false,
            false, false, true,
            true, false, false ]